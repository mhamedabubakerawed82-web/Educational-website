<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Peasy Speedy Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; }
        .bento-card { 
            background: #1e1e1e; border: 1px solid #333; 
            transition: all 0.3s ease; display: block; text-align: center; color: white; text-decoration: none;
        }
        .bento-card:hover { border-color: #3c424b; background: #3c3f46; }
        .active-page { background: #2563eb !important; border-color: #3b82f6 !important; font-weight: bold; }
    </style>
</head>
<body class="p-6 md:p-12">
    <header style="display: flex; align-items: center; gap: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
    
    
    
    <nav>
        <a href="about.html" style="color: #3b82f6; text-decoration: none; font-weight: bold; font-size: 1.1rem;">About Me</a>
    </nav>

</header>

    <nav class="flex justify-between items-center mb-12">
        <h1 class="text-2xl font-bold">Easy Peasy Speedy Learning</h1>
    </nav>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12" id="nav-container">
        <a href="index.html" class="bento-card p-4 rounded-xl" id="nav-home">Home</a>
        <a href="math.html" class="bento-card p-4 rounded-xl" id="nav-math">Math</a>
        <a href="physics.html" class="bento-card p-4 rounded-xl" id="nav-physics">Physics</a>
        <a href="programming.html" class="bento-card p-4 rounded-xl" id="nav-programming">Programming</a>
    </div>

    <section>
        <h2 class="text-2xl font-bold mb-6" id="page-title">Videos</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="video-container"></div>
    </section>

    <script>
        // 1. Identify which page we are on to highlight the button
        const path = window.location.pathname;
        if(path.includes("math")) document.getElementById("nav-math").classList.add("active-page");
        else if(path.includes("physics")) document.getElementById("nav-physics").classList.add("active-page");
        else if(path.includes("programming")) document.getElementById("nav-programming").classList.add("active-page");
        else document.getElementById("nav-home").classList.add("active-page");

        // 2. Data (Change this list for each specific file!)
        const videos = [
            { title: "Math G10", image: "https://i.ytimg.com/vi/g30Kv6oxG34/hqdefault.jpg?sqp=-oaymwEnCNACELwBSFryq4qpAxkIARUAAIhCGAHYAQHiAQoIGBACGAY4AUAB&rs=AOn4CLDZcaDgqtKBhDeQMcEsEKXTKtvTwA", link: "https://www.youtube.com/playlist?list=PLYeQy3bSujWjJTpLjGFDY6R11vpk3XBSE" },
            
            // Add more here...
        ];

        // 3. Render
        const container = document.getElementById('video-container');
        videos.forEach(video => {
            container.innerHTML += `
                <div class="bento-card p-4 rounded-2xl flex flex-col">
                    <img src="${video.image}" class="rounded-lg mb-4 w-full h-40 object-cover">
                    <h3 class="font-bold text-lg mb-4">${video.title}</h3>
                    <a href="${video.link}" target="_blank" class="mt-auto bg-blue-600 hover:bg-blue-500 text-center py-2 rounded-lg font-semibold">Watch Now</a>
                </div>
            `;
        });
    </script>
</body>
</html>
